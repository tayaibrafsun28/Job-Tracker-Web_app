<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.2.0/css/brands.min.css"
        integrity="sha512-N429FZtKvV43L3wUVXa477OUmso02/nFkLl6fgVHNnBL7LzupNMR6hSp7Dr1OpZaZK2Qek0Mrf9apF4XA1BY6g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind + Daisy UI -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Style -->

    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        .bg-primary {
            background-color: #F8FAFC;
        }

        .bg-secondary {
            background-color: #EEF4FF;
        }

        .text-color1 {
            color: #002C5C;
        }

        .text-color2 {
            color: #64748B;
        }

        .btn-primary {
            background-color: #3B82F6;
        }
    </style>

    <title>Job Application Tracker</title>
</head>

<body class="bg-primary">

    <!-- Counter section -->

    <section id="counter-section" class="max-w-[70%] mx-auto py-10 space-y-5 border-b border-gray-300">
        <h1 class="text-4xl text-color1 font-bold">Job Application Tracker</h1>

        <div id="counter-cards" class="flex gap-5">

            <div id="total-count" class="bg-white w-1/3 p-5 space-y-2 rounded-md">
                <p class="text-xl">Total</p>
                <p class="font-bold text-2xl">8</p>
            </div>

            <div id="interview-count" class="bg-white w-1/3 p-5 space-y-2 rounded-md">
                <p class="text-xl">Interview</p>
                <p class="font-bold text-2xl text-green-500">0</p>
            </div>

            <div id="rejected-count" class="bg-white w-1/3 p-5 space-y-2 rounded-md">
                <p class="text-xl">Rejected</p>
                <p class="font-bold text-2xl text-red-500">0</p>
            </div>
        </div>
    </section>

    <!-- Jobs Section -->

    <section id="jobs-section" class="max-w-[70%] mx-auto py-10 space-y-5">
        <h1 class="text-2xl text-color2 font-semibold">Available Jobs</h1>

        <div id="toggle-buttons" class="flex gap-5">
            <button id="all" class="w-24 h-8 btn-primary text-white rounded-md">All</button>
            <button id="all" class="w-24 h-8 bg-white text-color2  rounded-md">Interview</button>
            <button id="all" class="w-24 h-8 bg-white text-color2  rounded-md">Rejected</button>
        </div>



    </section>

</body>

</html>
